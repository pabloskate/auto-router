<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="orangeWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb7716" />
      <stop offset="100%" stop-color="#de5300" />
    </linearGradient>
    <linearGradient id="woodGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a87148" />
      <stop offset="100%" stop-color="#6b4225" />
    </linearGradient>
    
    <!-- Skin Gradients -->
    <linearGradient id="skinBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fad6c1" />
      <stop offset="100%" stop-color="#dfa98a" />
    </linearGradient>
    <linearGradient id="skinNeck" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d49a7a" />
      <stop offset="100%" stop-color="#c98c6a" />
    </linearGradient>
    <linearGradient id="skinShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d49a7a" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#b6714f" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Shirt Gradients -->
    <linearGradient id="shirtGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dceae8" />
      <stop offset="100%" stop-color="#a4bfbb" />
    </linearGradient>
    
    <!-- Glasses gradient -->
    <linearGradient id="glassesFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75" />
      <stop offset="25%" stop-color="#d1d9e6" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="75%" stop-color="#d1d9e6" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.75" />
    </linearGradient>
  </defs>

  <!-- BACKGROUND -->
  <!-- Orange upper wall -->
  <rect x="0" y="0" width="600" height="185" fill="url(#orangeWall)" />
  
  <!-- Black divider -->
  <rect x="0" y="185" width="600" height="4" fill="#1c110a" />
  
  <!-- Wood lower wall -->
  <rect x="0" y="189" width="600" height="611" fill="url(#woodGlow)" />
  
  <!-- Wood panels (Chevron pattern) -->
  <g stroke="#3a2210" stroke-width="2" opacity="0.4">
    <line x1="0" y1="250" x2="300" y2="550" />
    <line x1="0" y1="350" x2="300" y2="650" />
    <line x1="0" y1="450" x2="300" y2="750" />
    <line x1="0" y1="550" x2="300" y2="850" />
    <line x1="0" y1="650" x2="200" y2="850" />
    <line x1="0" y1="750" x2="100" y2="850" />
    <line x1="100" y1="189" x2="300" y2="389" />
    <line x1="200" y1="189" x2="300" y2="289" />

    <line x1="600" y1="250" x2="300" y2="550" />
    <line x1="600" y1="350" x2="300" y2="650" />
    <line x1="600" y1="450" x2="300" y2="750" />
    <line x1="600" y1="550" x2="300" y2="850" />
    <line x1="600" y1="650" x2="400" y2="850" />
    <line x1="600" y1="750" x2="500" y2="850" />
    <line x1="500" y1="189" x2="300" y2="389" />
    <line x1="400" y1="189" x2="300" y2="289" />
    
    <line x1="300" y1="189" x2="300" y2="800" stroke-width="4" stroke="#2a1508" opacity="0.6"/>
  </g>

  <!-- PERSON -->
  
  <!-- Neck & Chest -->
  <!-- Shortened neck, widened base -->
  <path d="M 210 460 L 390 460 L 400 600 L 200 600 Z" fill="url(#skinNeck)" />
  <!-- Adjusted chest shadow to flow into shirt -->
  <path d="M 200 550 C 260 630, 340 630, 400 550 Z" fill="#c98c6a" opacity="0.8" />
  <path d="M 210 460 C 260 520, 340 520, 390 460 C 340 490, 260 490, 210 460 Z" fill="#b36d4a" opacity="0.6" />
  
  <!-- Subtle collarbone definition -->
  <path d="M 220 560 C 240 570, 260 570, 280 560" fill="none" stroke="#b36d4a" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M 380 560 C 360 570, 340 570, 320 560" fill="none" stroke="#b36d4a" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- Shirt Base (Henley adjustments) -->
  <path d="M -50 800 L -20 680 C 40 600, 160 550, 230 550 C 240 550, 260 630, 260 630 L 300 700 L 340 630 C 340 630, 360 550, 370 550 C 440 550, 560 600, 620 680 L 650 800 Z" fill="url(#shirtGradient)" />
  
  <!-- Henley Open Collar Placket (Opened wider, softer edges) -->
  <!-- Left side folded back -->
  <path d="M 230 550 C 250 560, 270 630, 290 710 L 300 700 C 280 620, 260 550, 230 550 Z" fill="#c8dad8" />
  <!-- Right side folded back -->
  <path d="M 370 550 C 350 560, 330 630, 310 710 L 300 700 C 320 620, 340 550, 370 550 Z" fill="#b9cbca" />
  
  <!-- Under-placket shadow on skin -->
  <path d="M 255 550 C 270 620, 285 680, 295 720 L 305 720 C 315 680, 330 620, 345 550 Z" fill="#000000" opacity="0.15" />

  <!-- Shirt seams and folds -->
  <path d="M 230 550 C 170 580, 100 650, 60 740" fill="none" stroke="#93adab" stroke-width="3" stroke-linecap="round" />
  <path d="M 370 550 C 430 580, 500 650, 540 740" fill="none" stroke="#93adab" stroke-width="3" stroke-linecap="round" />
  <path d="M 210 550 C 215 570, 220 590, 220 610" fill="none" stroke="#b4c7c5" stroke-width="2" stroke-linecap="round" />
  <path d="M 390 550 C 385 570, 380 590, 380 610" fill="none" stroke="#b4c7c5" stroke-width="2" stroke-linecap="round" />

  <!-- Shirt Buttons -->
  <circle cx="282" cy="610" r="4.5" fill="#f4f4f4" stroke="#8a9e9b" stroke-width="1.5" />
  <circle cx="288" cy="650" r="4.5" fill="#f4f4f4" stroke="#8a9e9b" stroke-width="1.5" />
  <circle cx="294" cy="690" r="4.5" fill="#f4f4f4" stroke="#8a9e9b" stroke-width="1.5" />

  <line x1="280" y1="610" x2="284" y2="610" stroke="#8a9e9b" stroke-width="1"/>
  <line x1="286" y1="650" x2="290" y2="650" stroke="#8a9e9b" stroke-width="1"/>
  <line x1="292" y1="690" x2="296" y2="690" stroke="#8a9e9b" stroke-width="1"/>

  <!-- Ears (Restructured, moved down slightly and tucked in) -->
  <path d="M 188 380 C 175 390, 175 425, 185 435 C 190 420, 195 400, 195 400 Z" fill="url(#skinBase)" />
  <path d="M 412 380 C 425 390, 425 425, 415 435 C 410 420, 405 400, 405 400 Z" fill="url(#skinBase)" />
  
  <!-- Ear inner detail -->
  <path d="M 186 395 C 180 405, 182 420, 186 425" fill="none" stroke="#d49a7a" stroke-width="1.5" opacity="0.8"/>
  <path d="M 414 395 C 420 405, 418 420, 414 425" fill="none" stroke="#d49a7a" stroke-width="1.5" opacity="0.8"/>

  <!-- Face Shape (Jaw squared further, chin defined) -->
  <path d="M 195 350 C 195 440, 205 470, 225 505 C 245 530, 275 540, 300 540 C 325 540, 355 530, 375 505 C 395 470, 405 440, 405 350 C 405 250, 370 210, 300 210 C 230 210, 195 250, 195 350 Z" fill="url(#skinBase)" />
  
  <!-- Stronger Jawline shadow -->
  <path d="M 215 450 C 225 490, 245 515, 300 525 C 355 515, 375 490, 385 450 C 380 495, 355 530, 300 535 C 245 530, 220 495, 215 450 Z" fill="#cf9475" opacity="0.7" />

  <!-- Hair (Messier, shorter sides, textured top) -->
  <!-- Base shape -->
  <path d="M 192 350 C 182 280, 210 180, 300 180 C 390 180, 418 280, 408 350 C 398 300, 395 230, 300 230 C 205 230, 202 300, 192 350 Z" fill="#36281e" />
  
  <!-- Fringe / Hairline irregularities -->
  <path d="M 200 260 C 220 200, 280 190, 300 190 C 320 190, 380 200, 400 260 C 390 220, 360 200, 300 200 C 240 200, 210 220, 200 260 Z" fill="#261b14" />
  
  <!-- Jagged spiky bits on top -->
  <path d="M 210 195 L 218 185 L 225 192 Z" fill="#36281e" />
  <path d="M 240 185 L 250 175 L 260 182 Z" fill="#36281e" />
  <path d="M 280 180 L 290 168 L 302 178 Z" fill="#36281e" />
  <path d="M 320 178 L 330 170 L 340 180 Z" fill="#36281e" />
  <path d="M 360 185 L 368 178 L 375 188 Z" fill="#36281e" />
  
  <!-- Texture strokes in hair -->
  <g fill="none" stroke="#4a372b" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <path d="M 285 185 C 290 200, 295 210, 300 220"/>
    <path d="M 315 188 C 310 203, 305 213, 300 223"/>
    <path d="M 255 195 C 265 210, 275 215, 285 225"/>
    <path d="M 345 195 C 335 210, 325 215, 315 225"/>
  </g>
  
  <!-- Sideburns (Slightly longer and blended) -->
  <path d="M 191 340 C 194 365, 195 385, 200 395 L 197 340 Z" fill="#36281e" opacity="0.85" />
  <path d="M 409 340 C 406 365, 405 385, 400 395 L 403 340 Z" fill="#36281e" opacity="0.85" />

  <!-- Eyebrows (More natural arch, textured edges) -->
  <path d="M 215 315 C 240 300, 265 305, 280 315" fill="none" stroke="#3b2b21" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <path d="M 385 315 C 360 300, 335 305, 320 315" fill="none" stroke="#3b2b21" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <!-- Stray brow hairs -->
  <path d="M 215 315 L 210 320 M 280 315 L 285 318 M 385 315 L 390 320 M 320 315 L 315 318" fill="none" stroke="#3b2b21" stroke-width="2" opacity="0.7"/>

  <!-- Eyes Background (Adjusted shape, less wide, more relaxed) -->
  <path d="M 225 350 C 240 342, 265 342, 280 350 C 265 358, 240 358, 225 350 Z" fill="#ffffff" />
  <path d="M 375 350 C 360 342, 335 342, 320 350 C 335 358, 360 358, 375 350 Z" fill="#ffffff" />

  <!-- Upper eyelids (Heavy lids from photo) -->
  <path d="M 222 350 C 240 338, 265 338, 283 350" fill="none" stroke="#ca8e6d" stroke-width="2.5" opacity="0.9" stroke-linecap="round"/>
  <path d="M 378 350 C 360 338, 335 338, 317 350" fill="none" stroke="#ca8e6d" stroke-width="2.5" opacity="0.9" stroke-linecap="round"/>
  
  <path d="M 225 342 C 240 330, 265 330, 280 342" fill="none" stroke="#b57a5a" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <path d="M 375 342 C 360 330, 335 330, 320 342" fill="none" stroke="#b57a5a" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>

  <!-- Irises & Pupils (Deep blue-grey) -->
  <circle cx="250" cy="350" r="6.5" fill="#546c7a" />
  <circle cx="250" cy="350" r="3" fill="#151a1e" />
  <circle cx="247" cy="347" r="1.5" fill="#ffffff" />

  <circle cx="350" cy="350" r="6.5" fill="#546c7a" />
  <circle cx="350" cy="350" r="3" fill="#151a1e" />
  <circle cx="347" cy="347" r="1.5" fill="#ffffff" />

  <!-- Lower eye bags / creases -->
  <path d="M 228 358 C 245 365, 260 365, 275 358" fill="none" stroke="#c98c6a" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  <path d="M 372 358 C 355 365, 340 365, 325 358" fill="none" stroke="#c98c6a" stroke-width="2" opacity="0.8" stroke-linecap="round"/>

  <!-- Nose (Fined tuned shading) -->
  <!-- Bridge shadow -->
  <path d="M 280 330 C 275 375, 275 405, 280 435 C 290 445, 310 445, 320 435 C 325 405, 325 375, 320 330" fill="#d49a7a" opacity="0.6"/>
  <!-- Bridge highlight -->
  <path d="M 300 330 L 300 420" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.25" stroke-linecap="round" />

  <!-- Scar on nose bridge (Reddish tone, well integrated) -->
  <path d="M 292 370 L 305 352" fill="none" stroke="#c45d5d" stroke-width="2" opacity="0.75" stroke-linecap="round"/>
  <path d="M 294 372 L 307 354" fill="none" stroke="#e8a2a2" stroke-width="1" opacity="0.5" stroke-linecap="round"/>

  <!-- Nostrils and tip -->
  <path d="M 285 435 C 295 448, 305 448, 315 435" fill="none" stroke="#b87a5a" stroke-width="3.5" stroke-linecap="round" />
  <path d="M 268 425 C 275 433, 280 438, 285 435" fill="none" stroke="#bd7e5e" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 332 425 C 325 433, 320 438, 315 435" fill="none" stroke="#bd7e5e" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 282 435 C 285 438, 290 438, 292 435" fill="none" stroke="#7a462f" stroke-width="3" stroke-linecap="round" />
  <path d="M 318 435 C 315 438, 310 438, 308 435" fill="none" stroke="#7a462f" stroke-width="3" stroke-linecap="round" />

  <!-- Mouth (Wider, thinner lips) -->
  <!-- Upper Lip -->
  <path d="M 255 475 C 280 472, 320 472, 345 475 C 320 478, 280 478, 255 475 Z" fill="#c47a5f" opacity="0.9" />
  <!-- Lower Lip -->
  <path d="M 258 476 C 280 485, 320 485, 342 476 C 320 481, 280 481, 258 476 Z" fill="#d49074" opacity="0.95" />
  <!-- Center Line -->
  <path d="M 250 475 C 280 476, 320 476, 350 475" fill="none" stroke="#82462c" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Smile/Cheek Lines -->
  <path d="M 250 450 C 245 465, 245 480, 255 490" fill="none" stroke="#c88b6b" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 350 450 C 355 465, 355 480, 345 490" fill="none" stroke="#c88b6b" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Chin dimple -->
  <path d="M 285 510 C 295 515, 305 515, 315 510" fill="none" stroke="#c88b6b" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Facial Hair / Stubble (Denser, more organic shadow + dots) -->
  <path d="M 215 440 C 220 490, 245 530, 300 535 C 355 530, 380 490, 385 440 C 370 475, 340 500, 300 500 C 260 500, 230 475, 215 440 Z" fill="#665044" opacity="0.2" />
  <path d="M 250 465 C 280 460, 320 460, 350 465 C 335 495, 265 495, 250 465 Z" fill="#665044" opacity="0.15" />
  
  <g fill="#5c4538" opacity="0.35">
    <circle cx="225" cy="460" r="1"/><circle cx="230" cy="470" r="1"/><circle cx="235" cy="480" r="1"/>
    <circle cx="242" cy="495" r="1"/><circle cx="250" cy="505" r="1"/><circle cx="260" cy="515" r="1"/>
    <circle cx="270" cy="522" r="1"/><circle cx="280" cy="526" r="1"/><circle cx="290" cy="528" r="1"/>
    <circle cx="300" cy="530" r="1"/><circle cx="310" cy="528" r="1"/><circle cx="320" cy="526" r="1"/>
    <circle cx="330" cy="522" r="1"/><circle cx="340" cy="515" r="1"/><circle cx="350" cy="505" r="1"/>
    <circle cx="358" cy="495" r="1"/><circle cx="365" cy="480" r="1"/><circle cx="370" cy="470" r="1"/>
    <circle cx="375" cy="460" r="1"/>
    
    <circle cx="260" cy="495" r="1"/><circle cx="275" cy="500" r="1"/><circle cx="290" cy="505" r="1"/>
    <circle cx="310" cy="505" r="1"/><circle cx="325" cy="500" r="1"/><circle cx="340" cy="495" r="1"/>
    
    <circle cx="265" cy="465" r="1"/><circle cx="280" cy="462" r="1"/><circle cx="300" cy="460" r="1"/>
    <circle cx="320" cy="462" r="1"/><circle cx="335" cy="465" r="1"/>
  </g>

  <!-- Glasses (Refined shape, aviator corners, thicker frame) -->
  <g>
    <!-- Left Lens (Squared off bottom/outer edge) -->
    <path d="M 205 330 C 210 300, 275 300, 295 320 C 305 355, 290 405, 255 410 C 215 415, 200 375, 205 330 Z" 
          fill="none" stroke="url(#glassesFrame)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right Lens -->
    <path d="M 395 330 C 390 300, 325 300, 305 320 C 295 355, 310 405, 345 410 C 385 415, 400 375, 395 330 Z" 
          fill="none" stroke="url(#glassesFrame)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Inner frame 3D rim -->
    <path d="M 209 332 C 214 305, 272 305, 289 322 C 299 355, 286 398, 255 402 C 219 406, 205 372, 209 332 Z" 
          fill="none" stroke="#a0aab5" stroke-width="2.5" opacity="0.4"/>
    <path d="M 391 332 C 386 305, 328 305, 311 322 C 301 355, 314 398, 345 402 C 381 406, 395 372, 391 332 Z" 
          fill="none" stroke="#a0aab5" stroke-width="2.5" opacity="0.4"/>

    <!-- Double Bridge -->
    <path d="M 293 325 C 298 322, 302 322, 307 325" fill="none" stroke="url(#glassesFrame)" stroke-width="7" stroke-linecap="round"/>
    <!-- Straight top bar -->
    <path d="M 278 308 L 322 308" fill="none" stroke="url(#glassesFrame)" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Temples connecting -->
    <!-- Front hinge bumps -->
    <rect x="195" y="335" width="8" height="12" rx="3" fill="url(#glassesFrame)" opacity="0.9" />
    <rect x="397" y="335" width="8" height="12" rx="3" fill="url(#glassesFrame)" opacity="0.9" />
    
    <path d="M 198 340 L 175 350" fill="none" stroke="url(#glassesFrame)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 402 340 L 425 350" fill="none" stroke="url(#glassesFrame)" stroke-width="6" stroke-linecap="round"/>

    <!-- Prominent Glare -->
    <path d="M 215 330 C 235 325, 255 330, 270 355" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.3" stroke-linecap="round"/>
    <path d="M 220 350 L 235 370" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.2" stroke-linecap="round"/>
    
    <path d="M 330 355 C 345 330, 365 325, 385 330" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.3" stroke-linecap="round"/>
    <path d="M 365 370 L 380 350" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.2" stroke-linecap="round"/>
  </g>

</svg>