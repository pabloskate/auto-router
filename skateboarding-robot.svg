<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Background/Environment -->
  <rect width="800" height="600" fill="#f4f4f9" />
  
  <!-- Shadow -->
  <ellipse cx="400" cy="520" rx="150" ry="20" fill="#d0d0d5" />
  
  <!-- Motion lines -->
  <path d="M 150 480 L 50 480" stroke="#c0c0c5" stroke-width="6" stroke-linecap="round" />
  <path d="M 200 450 L 80 450" stroke="#c0c0c5" stroke-width="6" stroke-linecap="round" />
  <path d="M 180 510 L 100 510" stroke="#c0c0c5" stroke-width="6" stroke-linecap="round" />

  <!-- Skateboard -->
  <g id="skateboard">
    <!-- Wheels -->
    <circle cx="280" cy="490" r="25" fill="#333" />
    <circle cx="280" cy="490" r="10" fill="#fff" />
    <circle cx="520" cy="490" r="25" fill="#333" />
    <circle cx="520" cy="490" r="10" fill="#fff" />
    
    <!-- Trucks -->
    <rect x="265" y="460" width="30" height="20" fill="#aaa" />
    <rect x="505" y="460" width="30" height="20" fill="#aaa" />
    
    <!-- Deck -->
    <path d="M 200 440 C 180 430, 200 460, 240 460 L 560 460 C 600 460, 620 430, 600 440 Z" fill="#e74c3c" />
    <path d="M 200 440 C 180 430, 200 445, 240 445 L 560 445 C 600 445, 620 430, 600 440 Z" fill="#f1c40f" />
    <rect x="240" y="445" width="320" height="15" fill="#c0392b" />
  </g>

  <!-- Robot -->
  <g id="robot" transform="translate(0, -20)">
    <!-- Back Leg -->
    <path d="M 320 400 L 290 445" stroke="#7f8c8d" stroke-width="25" stroke-linecap="round" />
    <!-- Back Foot -->
    <g transform="translate(260, 430) rotate(-15)">
      <rect x="0" y="0" width="50" height="25" rx="10" fill="#95a5a6" />
    </g>

    <!-- Front Leg -->
    <path d="M 440 400 L 490 445" stroke="#7f8c8d" stroke-width="25" stroke-linecap="round" />
    <!-- Front Foot -->
    <g transform="translate(470, 430) rotate(15)">
      <rect x="0" y="0" width="50" height="25" rx="10" fill="#95a5a6" />
    </g>

    <!-- Torso -->
    <rect x="330" y="240" width="120" height="140" rx="15" fill="#ecf0f1" />
    <rect x="330" y="240" width="120" height="140" rx="15" fill="none" stroke="#bdc3c7" stroke-width="8" />
    
    <!-- Torso Details -->
    <rect x="350" y="260" width="80" height="40" rx="5" fill="#34495e" />
    <circle cx="370" cy="280" r="5" fill="#e74c3c" />
    <circle cx="390" cy="280" r="5" fill="#f1c40f" />
    <circle cx="410" cy="280" r="5" fill="#2ecc71" />
    <rect x="350" y="320" width="80" height="10" fill="#bdc3c7" />
    <rect x="350" y="340" width="80" height="10" fill="#bdc3c7" />

    <!-- Neck -->
    <rect x="375" y="210" width="30" height="35" fill="#7f8c8d" />

    <!-- Head -->
    <rect x="320" y="100" width="140" height="120" rx="20" fill="#ecf0f1" />
    <rect x="320" y="100" width="140" height="120" rx="20" fill="none" stroke="#bdc3c7" stroke-width="8" />

    <!-- Antenna -->
    <rect x="385" y="60" width="10" height="40" fill="#7f8c8d" />
    <circle cx="390" cy="50" r="12" fill="#e74c3c" />
    
    <!-- Face / Screen -->
    <rect x="335" y="120" width="110" height="60" rx="10" fill="#2c3e50" />
    <!-- Eyes -->
    <circle cx="365" cy="150" r="12" fill="#3498db" />
    <circle cx="415" cy="150" r="12" fill="#3498db" />
    <circle cx="368" cy="147" r="4" fill="#fff" />
    <circle cx="418" cy="147" r="4" fill="#fff" />
    <!-- Smile -->
    <path d="M 360 180 Q 390 195 420 180" fill="none" stroke="#3498db" stroke-width="4" stroke-linecap="round" />

    <!-- Ears/Bolts -->
    <rect x="305" y="145" width="15" height="30" rx="5" fill="#95a5a6" />
    <rect x="460" y="145" width="15" height="30" rx="5" fill="#95a5a6" />

    <!-- Back Arm -->
    <path d="M 340 260 Q 280 220 250 260" fill="none" stroke="#7f8c8d" stroke-width="22" stroke-linecap="round" />
    <!-- Back Hand (Claw) -->
    <path d="M 235 250 C 220 250, 220 280, 235 280 C 250 280, 260 270, 255 260" fill="none" stroke="#95a5a6" stroke-width="12" />

    <!-- Front Arm -->
    <path d="M 440 260 Q 520 240 550 180" fill="none" stroke="#7f8c8d" stroke-width="22" stroke-linecap="round" />
    <!-- Front Hand (Claw) -->
    <path d="M 545 170 C 560 160, 570 180, 560 195 C 550 205, 540 195, 540 185" fill="none" stroke="#95a5a6" stroke-width="12" />

    <!-- Speed/Wind lines on Robot -->
    <path d="M 470 120 L 510 120" stroke="#c0c0c5" stroke-width="4" stroke-linecap="round" />
    <path d="M 480 150 L 530 150" stroke="#c0c0c5" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>