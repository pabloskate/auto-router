<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <!-- SpongeBob colors -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfe40" />
      <stop offset="100%" stop-color="#e3dc10" />
    </linearGradient>
  </defs>

  <!-- Background (light blue bubbles theme) -->
  <rect width="400" height="500" fill="#a0d8ef" />
  <circle cx="50" cy="100" r="20" fill="white" opacity="0.3" />
  <circle cx="350" cy="250" r="30" fill="white" opacity="0.3" />
  <circle cx="80" cy="400" r="15" fill="white" opacity="0.3" />
  <circle cx="300" cy="80" r="10" fill="white" opacity="0.3" />
  <circle cx="370" cy="420" r="25" fill="white" opacity="0.3" />

  <!-- LEGS & FEET (Behind the body) -->
  <!-- Legs -->
  <rect x="145" y="390" width="10" height="60" fill="#fcf34a" stroke="black" stroke-width="2"/>
  <rect x="245" y="390" width="10" height="60" fill="#fcf34a" stroke="black" stroke-width="2"/>
  
  <!-- Socks -->
  <rect x="142" y="420" width="16" height="30" fill="white" stroke="black" stroke-width="2"/>
  <rect x="242" y="420" width="16" height="30" fill="white" stroke="black" stroke-width="2"/>
  
  <!-- Sock Stripes -->
  <!-- Left Sock -->
  <rect x="143" y="425" width="14" height="4" fill="#e82b2b" />
  <rect x="143" y="433" width="14" height="4" fill="#5fb4e5" />
  <!-- Right Sock -->
  <rect x="243" y="425" width="14" height="4" fill="#e82b2b" />
  <rect x="243" y="433" width="14" height="4" fill="#5fb4e5" />
  
  <!-- Left Shoe -->
  <circle cx="150" cy="460" r="12" fill="black" />
  <path d="M150 448 L 130 448 C 110 448, 110 472, 130 472 L 150 472 Z" fill="black"/>
  <circle cx="125" cy="456" r="4" fill="white" />
  
  <!-- Right Shoe -->
  <circle cx="250" cy="460" r="12" fill="black" />
  <path d="M250 448 L 270 448 C 290 448, 290 472, 270 472 L 250 472 Z" fill="black"/>
  <circle cx="275" cy="456" r="4" fill="white" />

  <!-- ARMS (Behind the body) -->
  <!-- Left Arm Outline -->
  <path d="M80 210 Q 40 250 60 300" fill="none" stroke="black" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Left Hand (4 fingers) -->
  <path d="M 54,295 
           C 35,295 35,315 48,312 
           C 45,335 65,335 62,315 
           C 70,335 85,320 72,305 
           C 88,305 85,285 66,295 Z" 
        fill="#fcf34a" stroke="black" stroke-width="2" stroke-linejoin="round"/>

  <!-- Left Arm Inner (covers the wrist joint) -->
  <path d="M80 210 Q 40 250 60 300" fill="none" stroke="#fcf34a" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Right Arm Outline -->
  <path d="M320 210 Q 360 250 340 300" fill="none" stroke="black" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Right Hand -->
  <path d="M 346,295 
           C 365,295 365,315 352,312 
           C 355,335 335,335 338,315 
           C 330,335 315,320 328,305 
           C 312,305 315,285 334,295 Z" 
        fill="#fcf34a" stroke="black" stroke-width="2" stroke-linejoin="round"/>

  <!-- Right Arm Inner (covers the wrist joint) -->
  <path d="M320 210 Q 360 250 340 300" fill="none" stroke="#fcf34a" stroke-width="8" stroke-linecap="round"/>

  <!-- BODY (Yellow Rectangle + Sponge Wavy outline) -->
  <!-- Outline -->
  <path d="M100,100 
           Q 110,95 120,100 Q 130,105 140,100 Q 150,95 160,100 Q 170,105 180,100 Q 190,95 200,100
           Q 210,105 220,100 Q 230,95 240,100 Q 250,105 260,100 Q 270,95 280,100 Q 290,105 300,100
           Q 305,110 300,120 Q 295,130 300,140 Q 305,150 300,160 Q 295,170 300,180 Q 305,190 300,200
           Q 295,210 300,220 Q 305,230 300,240 Q 295,250 300,260 Q 305,270 300,280 Q 295,290 300,300
           L 100,300
           Q 105,290 100,280 Q 95,270 100,260 Q 105,250 100,240 Q 95,230 100,220 Q 105,210 100,200
           Q 95,190 100,180 Q 105,170 100,160 Q 95,150 100,140 Q 105,130 100,120 Q 95,110 100,100
           Z" fill="url(#bodyGrad)" stroke="black" stroke-width="3"/>
           
  <!-- Sponge Holes -->
  <circle cx="130" cy="130" r="12" fill="#dcd119" stroke="#c8bc10" stroke-width="1"/>
  <circle cx="270" cy="140" r="15" fill="#dcd119" stroke="#c8bc10" stroke-width="1"/>
  <circle cx="120" cy="220" r="18" fill="#dcd119" stroke="#c8bc10" stroke-width="1"/>
  <circle cx="280" cy="230" r="12" fill="#dcd119" stroke="#c8bc10" stroke-width="1"/>
  <circle cx="140" cy="270" r="10" fill="#dcd119" stroke="#c8bc10" stroke-width="1"/>
  <circle cx="260" cy="275" r="8" fill="#dcd119" stroke="#c8bc10" stroke-width="1"/>
  <circle cx="240" cy="115" r="8" fill="#dcd119" stroke="#c8bc10" stroke-width="1"/>

  <!-- SHIRT -->
  <rect x="100" y="300" width="200" height="40" fill="white" stroke="black" stroke-width="3"/>
  
  <!-- PANTS -->
  <rect x="100" y="340" width="200" height="50" fill="#935b27" stroke="black" stroke-width="3"/>
  
  <!-- PANTS LEGS -->
  <path d="M135 390 L 165 390 L 160 410 L 140 410 Z" fill="#935b27" stroke="black" stroke-width="3"/>
  <path d="M235 390 L 265 390 L 260 410 L 240 410 Z" fill="#935b27" stroke="black" stroke-width="3"/>

  <!-- BELT -->
  <rect x="110" y="350" width="30" height="12" fill="black" />
  <rect x="155" y="350" width="30" height="12" fill="black" />
  <rect x="215" y="350" width="30" height="12" fill="black" />
  <rect x="260" y="350" width="30" height="12" fill="black" />

  <!-- SHIRT COLLAR & TIE -->
  <!-- Left Collar -->
  <polygon points="150,300 200,325 200,300" fill="white" stroke="black" stroke-width="2"/>
  <!-- Right Collar -->
  <polygon points="250,300 200,325 200,300" fill="white" stroke="black" stroke-width="2"/>
  
  <!-- Red Tie -->
  <polygon points="200,315 195,325 200,335 205,325" fill="#e82b2b" stroke="black" stroke-width="2"/>
  <polygon points="195,335 185,360 200,380 215,360 205,335" fill="#e82b2b" stroke="black" stroke-width="2"/>

  <!-- SHIRT SLEEVES -->
  <!-- Left Sleeve -->
  <path d="M100 190 A 25 25 0 0 0 65 210 L 80 230 A 25 25 0 0 1 100 220 Z" fill="white" stroke="black" stroke-width="3"/>
  <!-- Right Sleeve -->
  <path d="M300 190 A 25 25 0 0 1 335 210 L 320 230 A 25 25 0 0 0 300 220 Z" fill="white" stroke="black" stroke-width="3"/>

  <!-- FACE -->
  <!-- Cheeks -->
  <path d="M110,185 Q 125,165 145,185" fill="none" stroke="#e86b6b" stroke-width="3"/>
  <path d="M255,185 Q 275,165 290,185" fill="none" stroke="#e86b6b" stroke-width="3"/>
  
  <!-- Freckles -->
  <circle cx="118" cy="180" r="1.5" fill="#e86b6b"/>
  <circle cx="127" cy="175" r="1.5" fill="#e86b6b"/>
  <circle cx="136" cy="180" r="1.5" fill="#e86b6b"/>
  <circle cx="264" cy="180" r="1.5" fill="#e86b6b"/>
  <circle cx="273" cy="175" r="1.5" fill="#e86b6b"/>
  <circle cx="282" cy="180" r="1.5" fill="#e86b6b"/>

  <!-- Smile -->
  <path d="M125,185 Q 200,260 275,185" fill="none" stroke="black" stroke-width="3"/>
  <!-- Smile Ends -->
  <path d="M115,175 Q 120,180 125,185" fill="none" stroke="black" stroke-width="3"/>
  <path d="M285,175 Q 280,180 275,185" fill="none" stroke="black" stroke-width="3"/>

  <!-- Teeth -->
  <rect x="180" y="222" width="16" height="20" fill="white" stroke="black" stroke-width="2"/>
  <rect x="204" y="222" width="16" height="20" fill="white" stroke="black" stroke-width="2"/>

  <!-- Bottom Lip -->
  <path d="M190,248 Q 200,255 210,248" fill="none" stroke="#e86b6b" stroke-width="2"/>

  <!-- Eyes -->
  <circle cx="165" cy="150" r="35" fill="white" stroke="black" stroke-width="3"/>
  <circle cx="235" cy="150" r="35" fill="white" stroke="black" stroke-width="3"/>

  <!-- Left Pupil -->
  <circle cx="165" cy="150" r="16" fill="#5fb4e5" stroke="black" stroke-width="2"/>
  <circle cx="165" cy="150" r="8" fill="black"/>
  <circle cx="160" cy="145" r="4" fill="white"/>

  <!-- Right Pupil -->
  <circle cx="235" cy="150" r="16" fill="#5fb4e5" stroke="black" stroke-width="2"/>
  <circle cx="235" cy="150" r="8" fill="black"/>
  <circle cx="230" cy="145" r="4" fill="white"/>

  <!-- Eyelashes -->
  <!-- Left Eye -->
  <line x1="145" y1="117" x2="140" y2="100" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <line x1="165" y1="115" x2="165" y2="95" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <line x1="185" y1="117" x2="190" y2="100" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <!-- Right Eye -->
  <line x1="215" y1="117" x2="210" y2="100" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <line x1="235" y1="115" x2="235" y2="95" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <line x1="255" y1="117" x2="260" y2="100" stroke="black" stroke-width="4" stroke-linecap="round"/>

  <!-- Nose (over the eyes) -->
  <path d="M195,170 C 185,135 215,135 205,170" fill="#fcf34a" stroke="black" stroke-width="3"/>

  <!-- GARY THE SNAIL -->
  <g id="gary">
    <!-- Shell -->
    <circle cx="345" cy="410" r="32" fill="#ff99c2" stroke="black" stroke-width="2"/>
    
    <!-- Shell Inner Swirl -->
    <path d="M 345 410 C 345 400, 355 400, 355 410 C 355 422, 333 422, 333 410 C 333 390, 368 390, 368 412" fill="none" stroke="#cc3366" stroke-width="4.5" stroke-linecap="round"/>
    
    <!-- Shell Dots -->
    <circle cx="325" cy="395" r="4" fill="#cc3366"/>
    <circle cx="320" cy="415" r="3" fill="#cc3366"/>
    <circle cx="330" cy="433" r="3.5" fill="#cc3366"/>
    <circle cx="365" cy="432" r="4" fill="#cc3366"/>
    <circle cx="370" cy="395" r="3" fill="#cc3366"/>

    <!-- Far Stalk (Left) -->
    <path d="M 308 440 Q 295 400 300 375 L 306 375 Q 301 400 314 440 Z" fill="#98d9c6" stroke="black" stroke-width="2" stroke-linejoin="round"/>
    <!-- Near Stalk (Right) -->
    <path d="M 315 445 Q 305 400 315 375 L 321 375 Q 311 400 323 445 Z" fill="#98d9c6" stroke="black" stroke-width="2" stroke-linejoin="round"/>

    <!-- Far Eye -->
    <circle cx="303" cy="368" r="10" fill="#dce85e" stroke="black" stroke-width="2"/>
    <circle cx="299" cy="368" r="4" fill="#d33d32" stroke="black" stroke-width="1.5"/>
    <circle cx="297" cy="368" r="2" fill="black"/>
    <circle cx="300" cy="366" r="1.5" fill="white"/> <!-- Eye highlight -->

    <!-- Near Eye -->
    <circle cx="318" cy="368" r="11" fill="#dce85e" stroke="black" stroke-width="2"/>
    <circle cx="314" cy="368" r="4.5" fill="#d33d32" stroke="black" stroke-width="1.5"/>
    <circle cx="312" cy="368" r="2.5" fill="black"/>
    <circle cx="315" cy="366" r="1.5" fill="white"/> <!-- Eye highlight -->

    <!-- Body -->
    <path d="M 285 465 
             L 385 465 
             C 395 465, 395 448, 385 445 
             C 375 442, 360 440, 345 440
             C 320 440, 305 443, 295 445
             C 275 448, 275 465, 285 465 Z" 
          fill="#98d9c6" stroke="black" stroke-width="2" stroke-linejoin="round"/>
          
    <!-- Body Underside Wavy Edge -->
    <path d="M 283 458 Q 295 450 305 458 T 325 458 T 345 458 T 365 458 T 386 458" fill="none" stroke="#68a391" stroke-width="2" stroke-linecap="round"/>
  </g>

</svg>
